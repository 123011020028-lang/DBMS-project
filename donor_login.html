<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Donor Login</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #b30000, #550000);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Login Card */
    .login-card {
      width: 380px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      color: white;
      text-align: center;
      animation: fadeIn 0.6s ease-in-out;
    }

    .login-card h2 {
      margin-bottom: 15px;
      font-size: 28px;
      font-weight: 700;
    }

    .login-card p {
      margin-top: -8px;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .login-card label {
      display: block;
      text-align: left;
      margin-top: 12px;
      font-weight: 600;
      font-size: 14px;
    }

    .login-card input {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      border: none;
      background: white;
      color: #b30000;
      font-size: 17px;
      font-weight: bold;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-primary:hover {
      background: #ffd0d0;
      transform: translateY(-3px);
    }

    .register-link {
      color: #fff;
      display: block;
      margin-top: 18px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="login-card">
    <h2>Donor Login</h2>
    <p>Access your donor account</p>

    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="Enter your email" required>

      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" required>

      <button class="btn-primary" type="submit">Login</button>
    </form>

    <p id="loginMessage" style="color: #ffe6e6; margin-top: 10px;"></p>

    <a class="register-link" href="register.html">New user? Register here</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
