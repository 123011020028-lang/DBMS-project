<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blood Donation Camp Coordination System</title>
  <style>
    body {
      margin:0;
      font-family: "Segoe UI", sans-serif;
      background: #f7f7f7;
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }

    .hero {
      flex:1;
      background: linear-gradient(rgba(179,0,0,0.7), rgba(179,0,0,0.7)),
                  url("https://images.unsplash.com/photo-1579154204601-01588f351e67?auto=format&fit=crop&w=1400&q=80");
      background-size: cover;
      background-position: center;
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .hero h1 { font-size:50px; margin:0; font-weight:700; }
    .hero p { font-size:20px; margin-top:10px; max-width:700px; }

    .btn-group {
      margin-top:30px;
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:15px;
    }

    .btn {
      padding:15px 35px;
      border:none;
      background:#ffffff;
      color:#b30000;
      font-size:18px;
      font-weight:600;
      cursor:pointer;
      border-radius:30px;
      transition:0.3s;
    }

    .btn:hover {
      background:#b30000;
      color:white;
      transform:translateY(-3px);
    }

    footer {
      background:#111;
      color:white;
      text-align:center;
      padding:20px;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Blood Donation Camp Coordination System</h1>
    <p>Connecting donors, hospitals, and emergencies in the fastest and most reliable way. Save lives with a single click.</p>

    <div class="btn-group">
      <button class="btn" onclick="location.href='register.html'">Register as Donor</button>
      <button class="btn" onclick="location.href='donor_login.html'">Donor Login</button>
      <button class="btn" onclick="location.href='hospital.html'">Hospital Portal</button>
      <button class="btn" onclick="location.href='admin_login.html'">Admin Login</button>
      <button class="btn" onclick="location.href='about.html'">About</button>
    </div>
  </div>

  <footer>
    © 2025 Blood Donation Camp Coordination System | Designed with ❤️ to Save Lives
  </footer>
</body>
</html>
