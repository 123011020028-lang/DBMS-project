<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 25px;
            width: 320px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px #aaa;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #888;
        }
        button {
            width: 95%;
            padding: 12px;
            background: #8B0000;
            color: white;
            border: none;
            font-size: 17px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #b30000;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Admin Login</h2>

    <input type="text" id="adminUser" placeholder="Enter Username">
    <input type="password" id="adminPass" placeholder="Enter Password">

    <button onclick="adminLogin()">Login</button>

    <p style="color:red; font-size: 14px;" id="errorMsg"></p>
</div>

<script>
function adminLogin() {
    let user = document.getElementById("adminUser").value.trim();
    let pass = document.getElementById("adminPass").value.trim();
    let error = document.getElementById("errorMsg");

    // 🔥 You can change this username/password
    const correctUser = "admin";
    const correctPass = "1234";

    if (user === "" || pass === "") {
        error.innerHTML = "Enter username & password!";
        return;
    }

    if (user === correctUser && pass === correctPass) {
        // Store admin name
        localStorage.setItem("adminUser", user);

        // Redirect to dashboard
        window.location.href = "admin_dashboard.html";
    } else {
        error.innerHTML = "Incorrect credentials!";
    }
}
</script>

</body>
</html>
