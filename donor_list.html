<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donor List</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: #f7f9fc;
            margin: 0;
            padding: 0;
        }

        .topbar {
            background: #b30000;
            color: white;
            padding: 15px 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            max-width: 900px;
            background: white;
            margin: 40px auto;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #b30000;
            margin-bottom: 10px;
        }

        label {
            font-weight: bold;
        }

        select {
            padding: 10px;
            width: 200px;
            font-size: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #bbb;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #b30000;
            color: #fff;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .btn-back {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background: #b30000;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-back:hover {
            background: #7a0000;
        }
    </style>
</head>
<body>

    <div class="topbar">Hospital Portal – Donor List</div>

    <div class="container">
        <h2>Available Donors</h2>

        <label for="bloodFilter">Filter by Blood Group:</label>
        <select id="bloodFilter">
            <option value="ALL">All</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
        </select>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Blood Group</th>
                    <th>City</th>
                    <th>Phone</th>
                </tr>
            </thead>
            <tbody id="donorTable">
                <!-- Data fills automatically -->
            </tbody>
        </table>

        <a href="hospital.html" class="btn-back">⬅ Back to Hospital Portal</a>
    </div>

    <script src="script.js"></script>

</body>
</html>
